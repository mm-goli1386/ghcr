name: Force Push Docker Parts

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Pull and split
        run: |
          docker pull ghcr.io/m-logique/fluffychat-building-bundle:44233fc3b0ffa2ab0a5bde6178a7c77597143c49
          docker save ghcr.io/m-logique/fluffychat-building-bundle:44233fc3b0ffa2ab0a5bde6178a7c77597143c49 | gzip > image.tar.gz
          split -b 99614720 image.tar.gz part-
          rm -f image.tar.gz
          ls -lh part-*
      
      - name: Create helper files
        run: |
          echo '#!/bin/bash' > restore.sh
          echo 'cat part-* > image.tar.gz' >> restore.sh
          echo 'gunzip image.tar.gz' >> restore.sh
          echo 'docker load -i image.tar' >> restore.sh
          chmod +x restore.sh
          
          echo "# Docker Image" > README.md
          echo "Run \`./restore.sh\` to load the image" >> README.md
      
      - name: Commit and Force Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # افزودن همه فایل‌های جدید
          git add part-* restore.sh README.md
          
          # commit
          git commit -m "Add Docker image parts" || exit 0
          
          # push با force (در صورت نیاز)
          git push origin HEAD:main --force
