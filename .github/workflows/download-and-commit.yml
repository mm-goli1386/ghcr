name: Sync Sable Image

on:
  workflow_dispatch:  # اجرای دستی
  schedule:
    - cron: '0 0 * * 0'  # هفته‌ای یک بار

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull from ghcr.io
        run: |
          docker pull ghcr.io/sableclient/sable:latest
          docker tag ghcr.io/sableclient/sable:latest ghcr.io/${{ github.repository }}/sable:latest

      - name: Push to your registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository }}/sable:latest
